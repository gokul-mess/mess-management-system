<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16a34a" />
    <title>Gokul Mess — Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f9fafb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .card {
        background: white;
        border-radius: 1.5rem;
        padding: 2.5rem 2rem;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      }

      .icon-wrap {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #16a34a, #15803d);
        border-radius: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
      }

      .icon-wrap svg {
        width: 40px;
        height: 40px;
        fill: none;
        stroke: white;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #111827;
        margin-bottom: 0.5rem;
      }

      .app-name {
        font-size: 0.875rem;
        font-weight: 600;
        color: #16a34a;
        margin-bottom: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      p {
        color: #6b7280;
        font-size: 0.9375rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .btn {
        display: inline-block;
        background: #16a34a;
        color: white;
        font-weight: 600;
        font-size: 0.9375rem;
        padding: 0.75rem 2rem;
        border-radius: 9999px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s;
      }

      .btn:hover { background: #15803d; }

      .status {
        margin-top: 1.5rem;
        font-size: 0.8125rem;
        color: #9ca3af;
      }

      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #ef4444;
        border-radius: 50%;
        margin-right: 6px;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrap">
        <!-- Wifi-off icon -->
        <svg viewBox="0 0 24 24">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1" fill="white" stroke="none"/>
        </svg>
      </div>

      <div class="app-name">Gokul Mess</div>
      <h1>You're Offline</h1>
      <p>
        No internet connection detected.<br />
        Please check your network and try again.
      </p>

      <button class="btn" onclick="tryReconnect()">Try Again</button>

      <div class="status">
        <span class="dot"></span>
        No connection
      </div>
    </div>

    <script>
      function tryReconnect() {
        if (navigator.onLine) {
          window.location.reload();
        } else {
          const btn = document.querySelector('.btn');
          btn.textContent = 'Still offline...';
          setTimeout(() => { btn.textContent = 'Try Again'; }, 2000);
        }
      }

      // Auto-reload when connection is restored
      window.addEventListener('online', () => {
        window.location.reload();
      });
    </script>
  </body>
</html>
